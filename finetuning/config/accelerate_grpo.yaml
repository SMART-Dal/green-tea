compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU
downcast_bf16: 'no'
enable_cpu_affinity: true
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 4  # 4×A100 GPUs
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

# DeepSpeed integration
deepspeed_config:
  deepspeed_config_file: config/ds_zero2.json
  zero3_init_flag: false

# GRPO-specific settings
grpo_config:
  num_generations: 16  # K=16 group size
  beta: 0.04  # KL penalty coefficient
  gamma: 1.0  # Reward discount
  simulation_workers: 16  # Parallel Sniper simulations
  simulation_timeout: 10  # Seconds per simulation
