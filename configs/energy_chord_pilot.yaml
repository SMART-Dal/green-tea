# Energy-Efficient Code Generation - Pilot Configuration
# Small-scale testing configuration for PIE energy CHORD training
# Reduced parameters for faster testing and validation

project: "Energy-Efficient-Code-Generation-Pilot"
name: "pie_energy_chord_pilot"
checkpoint_root_dir: ${oc.env:TRINITY_CHECKPOINT_ROOT_DIR,./checkpoints}

algorithm:
  algorithm_type: mix_chord              # Use Trinity-RFT CHORD exactly
  repeat_times: 4                       # Reduced for pilot
  kl_loss_fn_args:
    kl_coef: 0.0
  sample_strategy_args:
    expert_data_ratio: 0.25             # Slightly higher for pilot testing
  policy_loss_fn_args:                  # Trinity-RFT CHORD loss (unchanged)
    mu_warmup_steps: 100                # Reduced for pilot
    mu_decay_steps: 200                 # Reduced for pilot
    mu_peak: 0.5
    mu_valley: 0.02
    enable_phi_function: true
    clip_range: 0.2
    use_token_level_loss_in_sft: true
    use_dynamic_bsz: true
    ppo_mini_batch_size: 64             # Reduced for pilot
    ppo_micro_batch_size_per_gpu: 2     # Reduced for pilot
    ngpus_trainer: 4                    # Reduced for pilot
    train_batch_size_expert: 32         # Reduced for pilot
    train_batch_size_usual: 128         # Reduced for pilot

model:
  model_path: ${oc.env:TRINITY_MODEL_PATH,Qwen/Qwen2.5-1.5B-Instruct}
  max_response_tokens: 5120             # Reduced for pilot
  max_model_len: 6144                   # Reduced for pilot

cluster:
  node_num: 1
  gpu_per_node: 4                       # Reduced for pilot

buffer:
  total_epochs: 2                       # Reduced for pilot
  batch_size: 16                        # Reduced for pilot
  train_batch_size: 160                 # Reduced for pilot
  explorer_input:
    taskset:
      name: pie_energy_data_pilot
      storage_type: file
      path: ${oc.env:TRINITY_TASKSET_PATH}
      format:
        prompt_key: 'problem'
        response_key: 'answer'
      rollout_args:
        temperature: 1.0
        logprobs: 0
      workflow_args:
        with_think: true
    eval_tasksets: []
    default_workflow_type: 'code_optimization_workflow'
  trainer_input:
    experience_buffer:
      name: energy_buffer_pilot
      storage_type: queue
      path: 'sqlite:///pie_energy_chord_pilot.db'
    auxiliary_buffers:
      sft_dataset:
        total_epochs: 15                # Reduced for pilot
        name: PIE_SFT_data_pilot
        storage_type: file
        path: ${oc.env:TRINITY_SFT_DATASET_PATH}
        split: 'train'
        format:
          prompt_type: messages
          messages_key: 'messages'

explorer:
  eval_interval: 5                      # More frequent for pilot
  runner_per_model: 4                   # Reduced for pilot
  rollout_model:
    engine_num: 4                       # Reduced for pilot
    tensor_parallel_size: 1
    enable_prefix_caching: false
    enforce_eager: true
    dtype: bfloat16
    seed: 42

synchronizer:
  sync_method: 'nccl'
  sync_interval: 1
  sync_timeout: 600                     # Reduced for pilot

trainer:
  save_interval: 25                     # More frequent for pilot
  trainer_config:
    actor_rollout_ref:
      model:
        use_remove_padding: true
      actor:
        use_dynamic_bsz: true
        ppo_max_token_len_per_gpu: 12800  # Reduced for pilot
        ulysses_sequence_parallel_size: 1  # Reduced for pilot
        optim:
          lr: 2e-6                      # Slightly higher for pilot
      ref:
        log_prob_use_dynamic_bsz: ${trainer.trainer_config.actor_rollout_ref.actor.use_dynamic_bsz}
        log_prob_max_token_len_per_gpu: ${trainer.trainer_config.actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
        ulysses_sequence_parallel_size: ${trainer.trainer_config.actor_rollout_ref.actor.ulysses_sequence_parallel_size}

monitor:
  monitor_type: wandb
  wandb:
    project: "energy-efficient-code-generation-pilot"
    entity: "energy-chord-pilot"
    tags: ["energy", "chord", "pie-dataset", "code-optimization", "pilot"]